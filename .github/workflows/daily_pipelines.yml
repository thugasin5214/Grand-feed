name: Daily Intel Feed

on:
  schedule:
    - cron: '0 12 * * *'  # Daily at noon UTC
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Pipeline to run (leave empty for all)'
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate secrets.yaml
        run: |
          python3 - << 'EOF'
          import yaml
          import os
          
          secrets = {
              'openrouter': {
                  'api_key': os.environ.get('OPENROUTER_API_KEY', '')
              },
              'email': {
                  'smtp_host': 'smtp.gmail.com',
                  'smtp_port': 587,
                  'sender': os.environ.get('GMAIL_SENDER', ''),
                  'password': os.environ.get('GMAIL_PASSWORD', '')
              },
              'newsapi': {
                  'api_key': os.environ.get('NEWSAPI_KEY', '')
              }
          }
          
          # Create config directory
          os.makedirs('config', exist_ok=True)
          
          # Write secrets file
          with open('config/secrets.yaml', 'w') as f:
              yaml.dump(secrets, f, default_flow_style=False)
          
          print("Secrets file created successfully")
          EOF
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      
      - name: Run pipelines
        run: |
          PIPELINE="${{ github.event.inputs.pipeline }}"
          if [ -n "$PIPELINE" ]; then
            echo "Running specific pipeline: $PIPELINE"
            python scripts/run_pipeline.py "$PIPELINE"
          else
            echo "Running all enabled pipelines"
            python scripts/run_all.py
          fi
        env:
          PYTHONUNBUFFERED: '1'
          PYTHONPATH: ${{ github.workspace }}
      
      - name: Upload database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intel-feed-db-${{ github.run_id }}
          path: data/intel_feed.db
          retention-days: 7
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-${{ github.run_id }}
          path: |
            *.log
            logs/
          retention-days: 3